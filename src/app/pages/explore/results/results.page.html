<app-header title="{{title}}"></app-header>
<ion-content [fullscreen]="true">
  <div class="px-6 pt-4 pb-12">
    @if (isLoading) {
    <div class="grid grid-cols-2 gap-3">
      @for (i of skeletons; track i) {
      <div class="bg-gray-100 rounded-2xl h-40 animate-pulse"></div>
      }
    </div>
    } @if (!isLoading && meals.length === 0) {
    <div class="text-center py-20">
      <p class="text-5xl mb-4">🍽️</p>
      <p class="text-gray-900 font-bold text-lg">Nicio rețetă găsită</p>
      <p class="text-gray-400 text-sm mt-1">Încearcă altă căutare</p>
    </div>
    } @if (!isLoading && meals.length > 0) {
    <p class="text-xs font-bold tracking-widest text-gray-400 uppercase mb-4">
      {{ meals.length }} rețete găsite
    </p>
    <div class="grid grid-cols-2 gap-3">
      @for (meal of meals; track meal.idMeal) {
      <div
        (click)="goToMeal(meal.idMeal)"
        class="relative rounded-2xl overflow-hidden shadow-sm cursor-pointer active:scale-95 transition-transform"
      >
        <img
          [src]="meal.strMealThumb"
          [alt]="meal.strMeal"
          class="w-full h-40 object-cover"
        />
        <div
          class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"
        ></div>
        <div class="absolute bottom-0 left-0 right-0 p-3">
          <p class="text-white text-xs font-bold leading-tight">
            {{ meal.strMeal }}
          </p>
        </div>
      </div>
      }
    </div>
    }
  </div>
</ion-content>
