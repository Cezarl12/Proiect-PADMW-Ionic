<app-header title="Profile"></app-header>

<ion-content [fullscreen]="true">
  <div class="px-6 pt-8 pb-10 bg-white dark:bg-gray-950 min-h-full">
    @if (!isLoggedIn) {
    <div class="text-center py-32">
      <p class="text-6xl mb-4">👤</p>
      <p class="text-gray-900 dark:text-white font-black text-xl">
        Nu ești logat
      </p>
      <p class="text-gray-400 dark:text-gray-500 text-sm mt-2">
        Loghează-te pentru a vedea profilul
      </p>
      <button (click)="goToLogin()">
        <div
          class="mt-8 bg-gray-900 dark:bg-white text-white dark:text-gray-900 px-6 py-4 rounded-2xl font-bold text-sm active:scale-95 transition-transform"
        >
          Login
        </div>
      </button>
    </div>
    } @if (isLoggedIn && user) {
    <div class="flex flex-col items-center mb-10">
      <div
        class="w-24 h-24 bg-gray-900 dark:bg-white rounded-full flex items-center justify-center mb-4"
      >
        <span class="text-white dark:text-gray-900 text-3xl font-black"
          >{{ initials }}</span
        >
      </div>
      <h1 class="text-2xl font-black text-gray-900 dark:text-white">
        {{ user.name }}
      </h1>
      <p class="text-sm text-gray-400 dark:text-gray-500 mt-1">
        {{ user.email }}
      </p>
    </div>

    <div class="bg-gray-50 dark:bg-gray-900 rounded-2xl p-5 text-center mb-8">
      <p class="text-3xl font-black text-gray-900 dark:text-white">
        {{ favouriteCount }}
      </p>
      <p class="text-xs text-gray-400 dark:text-gray-500 font-medium mt-1">
        Rețete favorite
      </p>
    </div>

    <button
      (click)="logout()"
      class="w-full active:scale-95 transition-transform"
    >
      <div
        class="w-full bg-red-500 text-white rounded-2xl py-4 font-bold text-sm flex items-center justify-center gap-2"
      >
        <svg
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
          />
        </svg>
        Deconectează-te
      </div>
    </button>
    }
  </div>
</ion-content>
