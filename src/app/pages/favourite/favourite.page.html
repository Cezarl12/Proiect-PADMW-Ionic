<app-header title="Favorite"></app-header>

<ion-content [fullscreen]="true">
  <div class="px-6 pt-4 pb-12">
    @if (meals.length === 0) {
    <div class="text-center py-32">
      <p class="text-gray-900 font-black text-xl">Nicio rețetă salvată</p>
      <p class="text-gray-400 text-sm mt-2">
        Apasă inima pe o rețetă ca să o salvezi
      </p>
      <button
        (click)="goToExplore()"
        class="mt-8 bg-gray-900 text-white px-8 py-4 rounded-2xl font-bold text-sm active:scale-95 transition-transform"
      >
        Explorează rețete
      </button>
    </div>
    } @if (meals.length > 0) {
    <div class="mb-6">
      <h1 class="text-2xl font-black text-gray-900">Rețetele tale</h1>
      <p class="text-sm text-gray-400 mt-1">
        {{ meals.length }} rețete salvate
      </p>
    </div>

    <div class="grid grid-cols-2 gap-3">
      @for (meal of meals; track meal.idMeal) {
      <div
        (click)="goToMeal(meal.idMeal)"
        class="relative rounded-2xl overflow-hidden shadow-sm cursor-pointer active:scale-95 transition-transform"
      >
        <img
          [src]="meal.strMealThumb"
          [alt]="meal.strMeal"
          class="w-full h-40 object-cover"
        />
        <div
          class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"
        ></div>

        <!-- Remove button -->
        <button
          (click)="removeFavourite($event, meal.idMeal)"
          class="absolute top-2 right-2"
        >
          <div
            class="w-8 h-8 bg-white/20 backdrop-blur-sm rounded-full flex items-center justify-center"
          >
            <svg
              class="w-4 h-4 text-red-500"
              fill="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
              />
            </svg>
          </div>
        </button>

        <div class="absolute bottom-0 left-0 right-0 p-3">
          <p
            class="text-white/70 text-[10px] font-semibold uppercase tracking-widest mb-0.5"
          >
            {{ meal.strCategory }}
          </p>
          <p class="text-white text-xs font-bold leading-tight">
            {{ meal.strMeal }}
          </p>
        </div>
      </div>
      }
    </div>
    }
  </div>
</ion-content>
