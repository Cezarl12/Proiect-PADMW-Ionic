<app-header title="Register"></app-header>
<ion-content [fullscreen]="true">
  <div class="flex flex-col items-center justify-center min-h-full px-6 py-4">
    <div
      class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center"
    >
      <svg
        class="w-10 h-10 text-green-500"
        viewBox="0 0 24 24"
        fill="currentColor"
      >
        <path
          d="M8.1 13.34l2.83-2.83L3.91 3.5c-1.56 1.56-1.56 4.09 0 5.66l4.19 4.18zm6.78-1.81c1.53.71 3.68.21 5.27-1.38 1.91-1.91 2.28-4.65.81-6.12-1.46-1.46-4.2-1.1-6.12.81-1.59 1.59-2.09 3.74-1.38 5.27L3.7 19.87l1.41 1.41L12 14.41l6.88 6.88 1.41-1.41L13.41 13l1.47-1.47z"
        />
      </svg>
    </div>

    <h1 class="text-3xl font-black text-gray-900 mb-2">Creează cont</h1>
    <p class="text-sm text-gray-400 mb-10 text-center">
      Completează datele pentru a te înregistra
    </p>

    <div class="w-full space-y-4">
      <div>
        <label class="text-sm font-bold text-gray-700 mb-2 block">Nume</label>
        <input
          type="text"
          placeholder="Numele tău"
          [(ngModel)]="name"
          class="w-full bg-white border border-gray-200 rounded-2xl py-4 px-4 text-sm text-gray-900 placeholder-gray-300 outline-none focus:ring-2 focus:ring-gray-900 transition-all"
        />
      </div>

      <div>
        <label class="text-sm font-bold text-gray-700 mb-2 block">Email</label>
        <input
          type="email"
          placeholder="exemplu@mail.com"
          [(ngModel)]="email"
          class="w-full bg-white border border-gray-200 rounded-2xl py-4 px-4 text-sm text-gray-900 placeholder-gray-300 outline-none focus:ring-2 focus:ring-gray-900 transition-all"
        />
      </div>

      <div>
        <label class="text-sm font-bold text-gray-700 mb-2 block">Parolă</label>
        <div class="relative">
          <input
            [type]="showPassword ? 'text' : 'password'"
            placeholder="••••••••"
            [(ngModel)]="password"
            class="w-full bg-white border border-gray-200 rounded-2xl py-4 px-4 text-sm text-gray-900 placeholder-gray-300 outline-none focus:ring-2 focus:ring-gray-900 transition-all"
          />
          <button
            (click)="showPassword = !showPassword"
            class="absolute right-4 top-1/2 -translate-y-1/2"
          >
            @if (showPassword) {
            <svg
              class="w-5 h-5 text-gray-400"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 4.411m0 0L21 21"
              />
            </svg>
            } @else {
            <svg
              class="w-5 h-5 text-gray-400"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
              />
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
              />
            </svg>
            }
          </button>
        </div>
      </div>

      @if (error) {
      <p class="text-red-500 text-sm font-medium text-center">{{ error }}</p>
      }

      <button (click)="register()" class="w-full">
        <div
          class="w-full bg-gray-900 text-white rounded-2xl py-4 font-bold text-sm mt-4 active:scale-95 transition-transform"
        >
          Creează cont
        </div>
      </button>

      <div class="flex items-center gap-4 my-2">
        <div class="flex-1 h-px bg-gray-200"></div>
        <span class="text-xs font-bold text-gray-400 tracking-widest">SAU</span>
        <div class="flex-1 h-px bg-gray-200"></div>
      </div>

      <button (click)="goToLogin()" class="w-full">
        <div
          class="bg-white border-2 border-gray-900 text-gray-900 rounded-2xl py-4 font-bold text-sm active:scale-95 transition-transform"
        >
          Am deja cont
        </div>
      </button>
    </div>
  </div>
</ion-content>
