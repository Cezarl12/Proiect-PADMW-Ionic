<ion-header class="ion-no-border">
  <ion-toolbar class="shadow-xl dark:bg-gray-950">
    <ion-buttons slot="start">
      <button
        (click)="goBack()"
        class="ml-4 w-9 h-9 bg-gray-100 dark:bg-gray-800 !rounded-full flex items-center justify-center active:scale-90 transition-transform"
      >
        <svg
          class="w-6 h-6 text-gray-900 dark:text-white"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2.5"
            d="M15 19l-7-7 7-7"
          />
        </svg>
      </button>
    </ion-buttons>

    <ion-title class="ml-5 font-black text-gray-900 dark:text-white"
      >{{title}}</ion-title
    >

    <div slot="end" class="mr-4">
      @if (isLoggedIn) {
      <button routerLink="/profile">
        <div
          class="w-9 h-9 bg-gray-900 dark:bg-white rounded-full flex items-center justify-center"
        >
          <span class="text-white dark:text-gray-900 text-xs font-black"
            >{{initials}}</span
          >
        </div>
      </button>
      } @else {
      <button routerLink="/login">
        <div
          class="bg-gray-900 dark:bg-white text-white dark:text-gray-900 px-4 py-2 rounded-xl text-xs font-bold"
        >
          Login
        </div>
      </button>
      }
    </div>
  </ion-toolbar>
</ion-header>
